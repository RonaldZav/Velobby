# VELOBBY 26.3

lobbies:
  - lobby1
  - lobby2

special_lobbies:
  default: true # Enable the automatic connection to special_lobbies if the player has permissions.
  lobby2: velobby.use.premium # Requires that permission to connect.

connection-mode: random # random, balance, order

# List of servers where the /velobby command cannot be used.
# Supports wildcards (e.g., auth*)
blocked-servers:
  - auth*
  - login

# Check for updates on startup and notify admins
check-updates: true

# Enable auto-reconnect (fallback) when kicked from a server
auto-reconnect: true

# Aliases for the /velobby command
aliases:
  - lobby
  - hub

# Language file to use (without extension)
# Available: en, es, de
language: en
