usage: |
  <gradient:#00AAFF:#00FFAA><bold>Ayuda de Velobby</bold></gradient>
  <gray>Comandos disponibles:</gray>
  <dark_gray>»</dark_gray> <yellow>/velobby add</yellow> <gray>- Añadir servidor actual como lobby</gray>
  <dark_gray>»</dark_gray> <yellow>/velobby remove</yellow> <gray>- Eliminar servidor actual de lobbies</gray>
  <dark_gray>»</dark_gray> <yellow>/velobby status</yellow> <gray>- Ver estado de lobbies</gray>
  <dark_gray>»</dark_gray> <yellow>/velobby send <jugador|ALL></yellow> <gray>- Enviar jugador(es) al lobby</gray>
  <dark_gray>»</dark_gray> <yellow>/velobby reload</yellow> <gray>- Recargar configuración</gray>
server_added: "<green>Servidor <yellow>%s</yellow> añadido a los lobbies.</green>"
