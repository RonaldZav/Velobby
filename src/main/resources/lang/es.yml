lobby_online: "<dark_gray>»</dark_gray> <yellow>%s</yellow>: <green>%d jugadores</green>"
lobby_offline: "<dark_gray>»</dark_gray> <yellow>%s</yellow>: <red>Desconectado</red>"
sent_all: "<green>Enviados todos los jugadores al lobby.</green>"
